<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für dich</title>

<style>
body {
margin:0;
font-family: Arial;
background: linear-gradient(135deg, #1f1c2c, #928dab);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.card {
background: rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
backdrop-filter: blur(10px);
width:90%;
max-width:600px;
}

input {
padding:12px;
font-size:20px;
width:120px;
text-align:center;
border:none;
border-radius:10px;
margin-top:10px;
}

button {
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

#videoBox {
display:none;
margin-top:20px;
}

iframe {
width:100%;
height:350px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="card">

<div id="loginBox">
<h1>Für dich ❤️</h1>
<p>Gib unser Datum ein um Weiter zu kommen.</p>

<input type="password" id="code" maxlength="4" placeholder="••••">
<br>
<button onclick="checkCode()">Öffnen</button>

<p id="error"></p>
</div>

<div id="videoBox">

<h1>Ich wollte dir das einfach zeigen...</h1>

<p>Ich Liebe Dich</p>

<iframe
src="https://www.youtube.com/embed/_JCWZ59hZ0M"
allowfullscreen>
</iframe>

</div>

</div>

<script>
function checkCode() {
let code = document.getElementById("code").value;

if(code === "1208") {
document.getElementById("loginBox").style.display = "none";
document.getElementById("videoBox").style.display = "block";
} else {
document.getElementById("error").innerText = "Falscher Code";
}
}
</script>

</body>
</html>
